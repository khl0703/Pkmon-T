function t(key, vars) {
  let s = (i18n[key] && i18n[key][GS.lang]) || key;
  if (vars) for (let k in vars) s = s.replace('{'+k+'}', vars[k]);
  return s;
}

function loadSettings() {
  try { let s = JSON.parse(localStorage.getItem('pkt_settings')); if(s) GS = {...GS,...s}; } catch(e){}
}
function saveSettings() { localStorage.setItem('pkt_settings', JSON.stringify(GS)); }
loadSettings();

const keys = {};
const kp = {}; // key pressed this frame (consumed on read)
document.addEventListener('keydown', e => { keys[e.key] = true; kp[e.key] = true; e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.key] = false; });
function ck(k) { if(kp[k]){ kp[k]=false; return true; } return false; }
function ckAny() { let r = Object.keys(kp).some(k=>kp[k]); if(r) for(let k in kp) kp[k]=false; return r; }
function ckDir() {
  if(ck('ArrowUp')) return 'up';
  if(ck('ArrowDown')) return 'down';
  if(ck('ArrowLeft')) return 'left';
  if(ck('ArrowRight')) return 'right';
  return null;
}

// ========== DRAW HELPERS ==========
function drawWin(x,y,w,h) {
  ctx.fillStyle = C.winBrd;
  ctx.fillRect(x,y,w,h);
  ctx.fillStyle = C.winBg;
  ctx.fillRect(x+2,y+2,w-4,h-4);
  ctx.fillStyle = '#e8e8e0';
  ctx.fillRect(x+2,y+2,w-4,1);
  ctx.fillRect(x+2,y+2,1,h-4);
  ctx.fillStyle = '#c8c8b8';
  ctx.fillRect(x+w-3,y+3,1,h-5);
  ctx.fillRect(x+3,y+h-3,w-5,1);
}

function drawText(txt, x, y, size, color, font) {
  ctx.fillStyle = color || C.text;
  let f = font || (GS.lang==='ko' ? 'DotGothic16' : 'Press Start 2P');
  ctx.font = size+'px "'+f+'"';
  ctx.fillText(txt, x, y);
}

function drawTextCentered(txt, y, size, color) {
  ctx.fillStyle = color || C.text;
  let f = GS.lang==='ko' ? 'DotGothic16' : 'Press Start 2P';
  ctx.font = size+'px "'+f+'"';
  let m = ctx.measureText(txt);
  ctx.fillText(txt, (W-m.width)/2, y);
}

function drawHPBar(x, y, w, cur, max) {
  let ratio = Math.max(0, cur/max);
  let col = ratio > 0.5 ? C.hpGreen : ratio > 0.2 ? C.hpYellow : C.hpRed;
  ctx.fillStyle = '#383838';
  ctx.fillRect(x, y, w, 4);
  ctx.fillStyle = '#181818';
  ctx.fillRect(x+1, y+1, w-2, 2);
  ctx.fillStyle = col;
  ctx.fillRect(x+1, y+1, Math.floor((w-2)*ratio), 2);
}

function drawEXPBar(x, y, w, cur, max) {
  let ratio = max > 0 ? Math.min(1, cur/max) : 0;
  ctx.fillStyle = '#383838';
  ctx.fillRect(x, y, w, 3);
  ctx.fillStyle = '#181818';
  ctx.fillRect(x+1, y+1, w-2, 1);
  ctx.fillStyle = C.expBlue;
  ctx.fillRect(x+1, y+1, Math.floor((w-2)*ratio), 1);
}

function getTypeEff(atkType, defTypes) {
  let m = 1;
  defTypes.forEach(dt => { m *= TC[atkType][dt] || 1; });
  return m;
}

// ========== POKÉMON INSTANCE HELPERS ==========
function calcStat(base, lv, iv, isHP) {
  iv = iv || 15;
  if(isHP) return Math.floor(((2*base+iv)*lv)/100) + lv + 10;
  return Math.floor(((2*base+iv)*lv)/100) + 5;
}

function createPokemon(id, level) {
  let d = POKEDEX[id];
  if(!d) return null;
  let p = {
    id, level, exp:0, expNext: Math.pow(level,3),
    name: d.name, types: [...d.types],
    stats:{}, curHP:0,
    moves:[], iv:{hp:Math.floor(Math.random()*32), atk:Math.floor(Math.random()*32),
      def:Math.floor(Math.random()*32), spa:Math.floor(Math.random()*32),
      spd:Math.floor(Math.random()*32), spe:Math.floor(Math.random()*32)},
    status:null, nickname:null,
  };
  // Calc stats
  p.stats.hp = calcStat(d.bs.hp, level, p.iv.hp, true);
  p.stats.atk = calcStat(d.bs.atk, level, p.iv.atk);
  p.stats.def = calcStat(d.bs.def, level, p.iv.def);
  p.stats.spa = calcStat(d.bs.spa, level, p.iv.spa);
  p.stats.spd = calcStat(d.bs.spd, level, p.iv.spd);
  p.stats.spe = calcStat(d.bs.spe, level, p.iv.spe);
  p.curHP = p.stats.hp;
  // Learn moves
  let available = d.moves.filter(m => m.l <= level);
  p.moves = available.slice(-4).map(m => ({ name:m.m, pp:MOVES[m.m]?.pp||10, maxPP:MOVES[m.m]?.pp||10 }));
  p.expNext = Math.pow(level+1, 3) - Math.pow(level, 3);
  return p;
}

function getPkDisplayName(p) {
  if(p.nickname) return p.nickname;
  return GS.lang==='ko' ? p.name.ko : p.name.en;
}

// ========== SPRITE DRAWING (pixel art via code) ==========
function drawPokeball(x, y, s) {
  // Simple pokeball sprite
  let r = s/2;
  ctx.fillStyle = C.pokered;
  ctx.beginPath(); ctx.arc(x+r,y+r,r,Math.PI,0); ctx.fill();
  ctx.fillStyle = C.white;
  ctx.beginPath(); ctx.arc(x+r,y+r,r,0,Math.PI); ctx.fill();
  ctx.fillStyle = C.black;
  ctx.fillRect(x, y+r-1, s, 2);
  ctx.beginPath(); ctx.arc(x+r,y+r,r,0,Math.PI*2); ctx.lineWidth=1; ctx.strokeStyle=C.black; ctx.stroke();
  ctx.fillStyle = C.white;
  ctx.beginPath(); ctx.arc(x+r,y+r,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+r,y+r,3,0,Math.PI*2); ctx.stroke();
}

function drawCharSprite(x, y, dir, frame, isPlayer, color) {
  // Simple 16x32 character sprite drawn with code
  let c1 = isPlayer ? '#3868b0' : (color || '#c04040');
  let skin = '#f8c898';
  let hair = isPlayer ? '#483820' : '#282828';

  // Head
  ctx.fillStyle = hair;
  ctx.fillRect(x+4, y, 8, 4);
  ctx.fillStyle = skin;
  ctx.fillRect(x+4, y+4, 8, 6);
  // Eyes
  ctx.fillStyle = C.black;
  if(dir==='down'||dir===undefined) {
    ctx.fillRect(x+5,y+6,2,2);
    ctx.fillRect(x+9,y+6,2,2);
  } else if(dir==='up') {
    ctx.fillStyle = hair;
    ctx.fillRect(x+4,y+4,8,3);
  } else if(dir==='left') {
    ctx.fillRect(x+4,y+6,2,2);
  } else {
    ctx.fillRect(x+10,y+6,2,2);
  }
  // Body
  ctx.fillStyle = c1;
  ctx.fillRect(x+3, y+10, 10, 10);
  // Arms
  let armOff = (frame%2===1) ? 1 : 0;
  ctx.fillStyle = skin;
  ctx.fillRect(x+1, y+11+armOff, 2, 6);
  ctx.fillRect(x+13, y+11-armOff, 2, 6);
  // Legs
  ctx.fillStyle = '#384868';
  let legOff = (frame===1) ? 2 : (frame===3) ? -2 : 0;
  ctx.fillRect(x+4, y+20, 3, 8+legOff);
  ctx.fillRect(x+9, y+20, 3, 8-legOff);
  // Shoes
  ctx.fillStyle = '#a03030';
  ctx.fillRect(x+3, y+28+legOff, 4, 3);
  ctx.fillRect(x+9, y+28-legOff, 4, 3);
}

function drawPokemonSprite(x, y, id, size, isBack) {
  // Draw a simple pixel art representation for pokemon
  let d = POKEDEX[id];
  if(!d) return;
  let tc = TYPE_COLOR[d.types[0]] || '#a8a878';
  let s = size || 32;

  // Body shape based on type color
  ctx.fillStyle = tc;
  let cx = x+s/2, cy = y+s/2;
  // Main body - ellipse approximation
  ctx.beginPath();
  ctx.ellipse(cx, cy+2, s*0.35, s*0.4, 0, 0, Math.PI*2);
  ctx.fill();

  // Head
  ctx.beginPath();
  ctx.ellipse(cx, cy-s*0.2, s*0.25, s*0.25, 0, 0, Math.PI*2);
  ctx.fill();

  // Eyes (front only)
  if(!isBack) {
    ctx.fillStyle = C.white;
    ctx.fillRect(cx-s*0.12, cy-s*0.25, s*0.08, s*0.08);
    ctx.fillRect(cx+s*0.05, cy-s*0.25, s*0.08, s*0.08);
    ctx.fillStyle = C.black;
    ctx.fillRect(cx-s*0.1, cy-s*0.23, s*0.05, s*0.05);
    ctx.fillRect(cx+s*0.07, cy-s*0.23, s*0.05, s*0.05);
  }

  // Type-specific features
  if(d.types.includes('불꽃')) {
    // Flame tail
    ctx.fillStyle = '#f8a830';
    ctx.beginPath(); ctx.ellipse(cx+s*0.3, cy+s*0.1, s*0.08, s*0.15, 0.3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#f8d030';
    ctx.beginPath(); ctx.ellipse(cx+s*0.32, cy+s*0.05, s*0.04, s*0.08, 0.3, 0, Math.PI*2); ctx.fill();
  }
  if(d.types.includes('물')) {
    // Water drop
    ctx.fillStyle = '#88c0f0';
    ctx.fillRect(cx-s*0.02, cy+s*0.3, s*0.04, s*0.06);
  }
  if(d.types.includes('풀')) {
    // Leaf
    ctx.fillStyle = '#58c850';
    ctx.beginPath(); ctx.ellipse(cx, cy-s*0.4, s*0.1, s*0.06, -0.5, 0, Math.PI*2); ctx.fill();
  }
  if(d.types.includes('전기')) {
    // Lightning
    ctx.fillStyle = '#f8d030';
    ctx.fillRect(cx+s*0.2, cy-s*0.1, s*0.05, s*0.15);
  }
  if(d.types.includes('에스퍼')) {
    // Glow
    ctx.fillStyle = 'rgba(248,88,136,0.3)';
    ctx.beginPath(); ctx.arc(cx, cy-s*0.15, s*0.3, 0, Math.PI*2); ctx.fill();
  }
}

// ========== TILE RENDERING ==========
function drawTile(x, y, type) {
  let px = x*TILE, py = y*TILE;
  switch(type) {
    case 0: // floor
      ctx.fillStyle = C.floor;
      ctx.fillRect(px,py,TILE,TILE);
      ctx.fillStyle = '#d0c090';
      ctx.fillRect(px,py+TILE-1,TILE,1);
      break;
    case 1: // wall
      ctx.fillStyle = C.wall;
      ctx.fillRect(px,py,TILE,TILE);
      ctx.fillStyle = '#605040';
      ctx.fillRect(px,py,TILE,2);
      ctx.fillRect(px,py,2,TILE);
      break;
    case 2: // grass
      ctx.fillStyle = C.grassGreen;
      ctx.fillRect(px,py,TILE,TILE);
      // Grass blades
      ctx.fillStyle = C.grassDark;
      for(let i=0;i<4;i++) {
        let gx = px+2+i*4, gy = py+4+((i*3)%5);
        ctx.fillRect(gx,gy,1,4);
        ctx.fillRect(gx+1,gy+1,1,3);
      }
      break;
    case 3: // desk
      ctx.fillStyle = C.floor;
      ctx.fillRect(px,py,TILE,TILE);
      ctx.fillStyle = C.desk;
      ctx.fillRect(px+1,py+2,TILE-2,TILE-4);
      ctx.fillStyle = '#908060';
      ctx.fillRect(px+1,py+2,TILE-2,2);
      break;
    case 4: // door
      ctx.fillStyle = C.floor;
      ctx.fillRect(px,py,TILE,TILE);
      ctx.fillStyle = C.door;
      ctx.fillRect(px+2,py,TILE-4,TILE);
      ctx.fillStyle = '#a08050';
      ctx.fillRect(px+3,py+1,TILE-6,TILE-2);
      // knob
      ctx.fillStyle = '#d0b060';
      ctx.fillRect(px+TILE-5,py+8,2,2);
      break;
    case 5: // stairs
      ctx.fillStyle = C.floor;
      ctx.fillRect(px,py,TILE,TILE);
      ctx.fillStyle = '#b0a080';
      for(let i=0;i<4;i++) ctx.fillRect(px,py+i*4,TILE-i*3,4);
      break;
    case 6: // npc block (invisible, treated as floor)
      ctx.fillStyle = C.floor;
      ctx.fillRect(px,py,TILE,TILE);
      break;
    case 7: // bookshelf
      ctx.fillStyle = C.bookshelf;
      ctx.fillRect(px,py,TILE,TILE);
      ctx.fillStyle = '#e04040';
      ctx.fillRect(px+1,py+1,4,6);
      ctx.fillStyle = '#4060c0';
      ctx.fillRect(px+5,py+1,4,6);
      ctx.fillStyle = '#40a040';
      ctx.fillRect(px+9,py+1,4,6);
      ctx.fillStyle = '#d0a020';
      ctx.fillRect(px+1,py+8,5,6);
      ctx.fillStyle = '#8040a0';
      ctx.fillRect(px+6,py+8,5,6);
      break;
    case 8: // carpet
      ctx.fillStyle = C.carpet;
      ctx.fillRect(px,py,TILE,TILE);
      ctx.fillStyle = '#c05858';
      ctx.fillRect(px+1,py+1,TILE-2,TILE-2);
      break;
    case 9: // water
      ctx.fillStyle = C.water;
      ctx.fillRect(px,py,TILE,TILE);
      ctx.fillStyle = '#60a0e0';
      ctx.fillRect(px+2,py+4,8,1);
      ctx.fillRect(px+6,py+10,6,1);
      break;
  }
}

// Fade effect
let fade = { active:false, alpha:0, dir:1, callback:null, speed:0.05 };

function startFade(dir, cb, spd) {
  fade.active = true;
  fade.dir = dir; // 1=fade out, -1=fade in
  fade.alpha = dir===1 ? 0 : 1;
  fade.callback = cb;
  fade.speed = spd || 0.05;
}

function updateFade() {
  if(!fade.active) return;
  fade.alpha += fade.dir * fade.speed;
  if(fade.dir===1 && fade.alpha >= 1) {
    fade.alpha = 1;
    if(fade.callback) { fade.callback(); fade.callback = null; }
    fade.dir = -1;
  }
  if(fade.dir===-1 && fade.alpha <= 0) {
    fade.alpha = 0;
    fade.active = false;
  }
}

function drawFade() {
  if(!fade.active && fade.alpha <= 0) return;
  ctx.fillStyle = 'rgba(0,0,0,'+fade.alpha+')';
  ctx.fillRect(0,0,W,H);
}

// ========== DIALOG SYSTEM ==========
function showDialog(lines, cb) {
  screen = 'dialog';
  dialogState.lines = lines;
  dialogState.idx = 0;
  dialogState.charIdx = 0;
  dialogState.done = false;
  dialogState.typing = true;
  dialogState.callback = cb;
}

function updateDialog() {
  let line = dialogState.lines[dialogState.idx];
  if(!line) { if(dialogState.callback) dialogState.callback(); return; }

  let text = typeof line === 'string' ? t(line) : (GS.lang==='ko' ? line.ko : line.en);

  if(dialogState.typing) {
    dialogState.charIdx += [0.5, 1, 2][GS.textSpd];
    if(dialogState.charIdx >= text.length) {
      dialogState.charIdx = text.length;
      dialogState.typing = false;
    }
  }

  if(ck('x') || ck('X')) {
    if(dialogState.typing) {
      dialogState.charIdx = text.length;
      dialogState.typing = false;
    } else {
      dialogState.idx++;
      dialogState.charIdx = 0;
      dialogState.typing = true;
      if(dialogState.idx >= dialogState.lines.length) {
        dialogState.done = true;
        if(dialogState.callback) dialogState.callback();
        return;
      }
    }
  }
}

function renderDialog() {
  let line = dialogState.lines[dialogState.idx];
  if(!line) return;
  let text = typeof line === 'string' ? t(line) : (GS.lang==='ko' ? line.ko : line.en);
  let shown = text.substring(0, Math.floor(dialogState.charIdx));

  drawWin(4, H-52, W-8, 48);
  drawText(shown, 12, H-32, GS.lang==='ko'?12:8, C.text);

  if(!dialogState.typing) {
    let bounce = Math.sin(Date.now()/200)*2;
    ctx.fillStyle = C.textHi;
    ctx.fillRect(W-18, H-12+bounce, 6, 6);
  }
}

// ========== PROLOGUE ==========
function updatePrologue() {
  proState.timer++;
  let steps = ['pro.1','pro.2','pro.3','pro.4','pro.5','pro.6','pro.7'];

  if(proState.step < steps.length) {
    if(proState.timer < 30) {
      proState.alpha = Math.max(0, 1 - proState.timer/30);
    } else if(proState.timer < 120) {
      proState.alpha = 0;
      proState.typing = true;
      proState.charTimer += [0.5,1,2][GS.textSpd];
    } else {
      if(ck('x')||ck('X')||ck('z')||ck('Z')||proState.timer > 240) {
        proState.step++;
        proState.timer = 0;
        proState.charTimer = 0;
      }
    }
  } else {
    // Prologue done, go to starter selection
    PD.flags.prologue_done = true;
    startFade(1, () => {
      screen = 'field';
      loadMap('robarts-5f');
    });
  }
}

function renderPrologue() {
  ctx.fillStyle = C.black;
  ctx.fillRect(0,0,W,H);

  let steps = ['pro.1','pro.2','pro.3','pro.4','pro.5','pro.6','pro.7'];
  if(proState.step < steps.length) {
    let text = t(steps[proState.step]);
    let shown = text.substring(0, Math.floor(proState.charTimer));

    if(proState.step <= 4) {
      // Dark screen with text
      drawTextCentered(shown, H/2+4, GS.lang==='ko'?14:9, C.white);
    } else {
      // Waking up - lighter
      let brightness = Math.min(1, (proState.timer-20)/60);
      ctx.fillStyle = `rgba(184,200,216,${brightness*0.5})`;
      ctx.fillRect(0,0,W,H);
      drawTextCentered(shown, H/2+4, GS.lang==='ko'?14:9, brightness>0.3 ? C.text : C.white);
    }
  }

  // Flash effect at step transitions
  if(proState.timer < 5 && proState.step > 0) {
    ctx.fillStyle = `rgba(255,255,255,${1-proState.timer/5})`;
    ctx.fillRect(0,0,W,H);
  }
}

// ========== FIELD / MAP ==========
function loadMap(mapId) {
  let m = MAPS[mapId];
  if(!m) return;
  fieldState.map = mapId;
  PD.flags.currentMap = mapId;
  let spawn = m.spawns.default || m.spawns[Object.keys(m.spawns)[0]];
  fieldState.px = spawn.x;
  fieldState.py = spawn.y;
  fieldState.dir = spawn.dir || 'down';
  fieldState.moving = false;
  fieldState.moveT = 0;
}

function loadMapAt(mapId, spawnId) {
  let m = MAPS[mapId];
  if(!m) return;
  fieldState.map = mapId;
  PD.flags.currentMap = mapId;
  let spawn = m.spawns[spawnId] || m.spawns.default || m.spawns[Object.keys(m.spawns)[0]];
  fieldState.px = spawn.x;
  fieldState.py = spawn.y;
  fieldState.dir = spawn.dir || 'down';
  fieldState.moving = false;
  fieldState.moveT = 0;
}

function getTile(mapId, x, y) {
  let m = MAPS[mapId];
  if(!m || x<0 || y<0 || x>=m.w || y>=m.h) return 1;
  return m.tiles[y*m.w + x];
}

function isWalkable(mapId, x, y) {
  let t = getTile(mapId, x, y);
  if(t===1 || t===3 || t===7 || t===9) return false;
  // Check NPCs
  let m = MAPS[mapId];
  if(m && m.npcs) {
    for(let n of m.npcs) {
      if(n.x === x && n.y === y) return false;
    }
  }
  return true;
}

function updateField() {
  if(fade.active) return;

  let m = MAPS[fieldState.map];
  if(!m) return;

  // Moving animation
  if(fieldState.moving) {
    fieldState.moveT += (keys['z']||keys['Z']) ? 4 : 2; // B = run
    if(fieldState.moveT >= TILE) {
      fieldState.moveT = 0;
      fieldState.moving = false;
      fieldState.stepCount++;

      // Check exits
      for(let ex of (m.exits||[])) {
        if(fieldState.px === ex.x && fieldState.py === ex.y) {
          startFade(1, () => loadMapAt(ex.to, ex.spawn));
          return;
        }
      }

      // Check grass encounter
      let tile = getTile(fieldState.map, fieldState.px, fieldState.py);
      if(tile === 2 && m.encounter) {
        if(Math.random() < 0.15) { // ~15% per step on grass
          startWildBattle(m.encounter);
          return;
        }
      }
    }
    return;
  }

  // Open menu
  if(ck('s') || ck('S')) {
    screen = 'menu';
    menuState.sel = 0;
    return;
  }

  // Interact
  if(ck('x') || ck('X')) {
    let fx = fieldState.px, fy = fieldState.py;
    if(fieldState.dir==='up') fy--;
    if(fieldState.dir==='down') fy++;
    if(fieldState.dir==='left') fx--;
    if(fieldState.dir==='right') fx++;
    // Check NPC
    for(let n of (m.npcs||[])) {
      if(n.x===fx && n.y===fy) {
        interactNPC(n);
        return;
      }
    }
  }

  // Movement
  let dir = null;
  if(keys['ArrowUp']) dir='up';
  else if(keys['ArrowDown']) dir='down';
  else if(keys['ArrowLeft']) dir='left';
  else if(keys['ArrowRight']) dir='right';

  if(dir) {
    if(fieldState.dir !== dir) {
      fieldState.dir = dir;
    }
    let nx = fieldState.px, ny = fieldState.py;
    if(dir==='up') ny--;
    if(dir==='down') ny++;
    if(dir==='left') nx--;
    if(dir==='right') nx++;
    if(isWalkable(fieldState.map, nx, ny)) {
      fieldState.px = nx;
      fieldState.py = ny;
      fieldState.moving = true;
      fieldState.moveT = 0;
      fieldState.frame = (fieldState.frame+1)%4;
    }
  }
}

function interactNPC(npc) {
  // Face player
  if(fieldState.dir==='up') npc.dir='down';
  if(fieldState.dir==='down') npc.dir='up';
  if(fieldState.dir==='left') npc.dir='right';
  if(fieldState.dir==='right') npc.dir='left';

  let lines = npc.dialog ? npc.dialog.map(k=>t(k)) : (npc.dialog_raw || [{ko:'...',en:'...'}]);
  if(npc.dialog_raw) lines = npc.dialog_raw;

  // Special actions
  if(npc.action === 'starter_choice' && !PD.flags.has_starter) {
    showDialog(lines, () => {
      screen = 'starter';
      starterState.sel = 0;
    });
    return;
  }

  if(npc.action === 'heal') {
    showDialog(lines, () => {
      // Heal all pokemon
      PD.party.forEach(p => {
        p.curHP = p.stats.hp;
        p.status = null;
        p.moves.forEach(m => m.pp = m.maxPP);
      });
      showDialog([{ko:'포켓몬이 모두 건강해졌습니다!', en:'Your POKéMON are fully healed!'}], () => {
        screen = 'field';
      });
    });
    return;
  }

  if(PD.flags[npc.flag]) {
    // Already talked — show short dialog
    let shortDialog = npc.dialog_raw ? [npc.dialog_raw[0]] : [{ko:'...', en:'...'}];
    showDialog(shortDialog, () => { screen = 'field'; });
    return;
  }

  showDialog(lines, () => {
    if(npc.flag) PD.flags[npc.flag] = true;
    screen = 'field';
  });
}

function renderField() {
  let m = MAPS[fieldState.map];
  if(!m) return;

  ctx.fillStyle = C.black;
  ctx.fillRect(0,0,W,H);

  // Camera centered on player
  let camX = fieldState.px * TILE - W/2 + TILE/2;
  let camY = fieldState.py * TILE - H/2 + TILE/2;

  // Smooth movement offset
  let offX = 0, offY = 0;
  if(fieldState.moving) {
    let progress = fieldState.moveT / TILE;
    if(fieldState.dir==='up') offY = -TILE*(1-progress);
    if(fieldState.dir==='down') offY = TILE*(1-progress);
    if(fieldState.dir==='left') offX = -TILE*(1-progress);
    if(fieldState.dir==='right') offX = TILE*(1-progress);
    // Actually we moved the position already, so offset backwards
    if(fieldState.dir==='up') offY = TILE*(1-progress);
    if(fieldState.dir==='down') offY = -TILE*(1-progress);
    if(fieldState.dir==='left') offX = TILE*(1-progress);
    if(fieldState.dir==='right') offX = -TILE*(1-progress);
    camX -= offX;
    camY -= offY;
  }

  ctx.save();
  ctx.translate(-Math.round(camX), -Math.round(camY));

  // Draw tiles
  let startTX = Math.max(0, Math.floor(camX/TILE));
  let startTY = Math.max(0, Math.floor(camY/TILE));
  let endTX = Math.min(m.w, Math.ceil((camX+W)/TILE)+1);
  let endTY = Math.min(m.h, Math.ceil((camY+H)/TILE)+1);

  for(let ty=startTY; ty<endTY; ty++) {
    for(let tx=startTX; tx<endTX; tx++) {
      drawTile(tx, ty, m.tiles[ty*m.w+tx] || 0);
    }
  }

  // Draw NPCs
  for(let n of (m.npcs||[])) {
    drawCharSprite(n.x*TILE, n.y*TILE-16, n.dir, 0, false,
      n.sprite==='ash' ? '#d09020' : n.sprite==='nurse' ? '#e87898' : '#808080');
  }

  // Draw player
  let ppx = fieldState.px*TILE;
  let ppy = fieldState.py*TILE;
  drawCharSprite(ppx, ppy-16, fieldState.dir, fieldState.moving?fieldState.frame:0, true);

  ctx.restore();

  // Map name bar
  let mapName = GS.lang==='ko' ? m.name.ko : m.name.en;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0,0,W,16);
  drawText(mapName, 4, 12, GS.lang==='ko'?10:7, C.white);
}

// ========== WILD BATTLE ==========
function startWildBattle(encTable) {
  let table = ENCOUNTERS[encTable];
  if(!table || PD.party.length===0) return;

  // Pick pokemon
  let roll = Math.random()*100, cumul=0, chosen=table[0];
  for(let e of table) {
    cumul += e.rate;
    if(roll < cumul) { chosen = e; break; }
  }

  let lv = chosen.minLv + Math.floor(Math.random()*(chosen.maxLv-chosen.minLv+1));
  let wild = createPokemon(chosen.id, lv);

  if(!PD.pokedex.seen.includes(chosen.id)) PD.pokedex.seen.push(chosen.id);

  battleState = {
    type:'wild',
    enemy: wild,
    playerPk: PD.party[0],
    phase:'intro', // intro, menu, fight, animating, result, catch
    sel:0, moveSel:0,
    msg:[], msgIdx:0, msgCharIdx:0, msgTyping:true,
    turn:0, animTimer:0,
    playerAnim:{ x:0, shake:0 },
    enemyAnim:{ x:0, shake:0, alpha:1 },
    catchAnim:{ phase:0, shakes:0, timer:0 },
    runAttempts:0,
    prevScreen: screen,
  };

  let wildName = getPkDisplayName(wild);
  let playerName = getPkDisplayName(PD.party[0]);
  battleState.msg = [
    t('bat.wild', {name:wildName}),
    t('bat.go', {name:playerName}),
  ];

  startFade(1, () => {
    screen = 'battle';
  }, 0.08);
}

function updateBattle() {
  if(fade.active) return;
  let B = battleState;

  // Message display
  if(B.msg.length > 0 && B.msgIdx < B.msg.length) {
    B.msgCharIdx += [0.5,1,2][GS.textSpd];
    let curMsg = B.msg[B.msgIdx];
    if(B.msgCharIdx >= curMsg.length) {
      B.msgCharIdx = curMsg.length;
      B.msgTyping = false;
    }
    if(ck('x')||ck('X')) {
      if(B.msgTyping) {
        B.msgCharIdx = curMsg.length;
        B.msgTyping = false;
      } else {
        B.msgIdx++;
        B.msgCharIdx = 0;
        B.msgTyping = true;
        if(B.msgIdx >= B.msg.length) {
          // Messages done
          if(B.phase === 'intro') B.phase = 'menu';
          if(B.phase === 'result') {
            // Check win/lose/continue
            if(B.enemy.curHP <= 0) {
              endBattle(true);
              return;
            }
            if(B.playerPk.curHP <= 0) {
              // Check for next pokemon
              let next = PD.party.find(p => p.curHP > 0);
              if(next) {
                B.playerPk = next;
                B.msg = [t('bat.go', {name:getPkDisplayName(next)})];
                B.msgIdx = 0; B.msgCharIdx = 0; B.msgTyping = true;
                B.phase = 'intro';
              } else {
                endBattle(false);
              }
              return;
            }
            B.phase = 'menu';
          }
          if(B.phase === 'ranaway') {
            endBattle(true);
            return;
          }
          if(B.phase === 'caught') {
            endBattle(true);
            return;
          }
        }
      }
    }
    return;
  }

  // Battle menu
  if(B.phase === 'menu') {
    let d = ckDir();
    if(d==='up'||d==='down') B.sel ^= 2;
    if(d==='left'||d==='right') B.sel ^= 1;

    if(ck('x')||ck('X')) {
      if(B.sel===0) { B.phase='fight'; B.moveSel=0; } // Fight
      if(B.sel===1) { // Bag
        tryUsePokeball();
      }
      if(B.sel===2) { // Pokemon
        screen = 'party';
        partyState.sel = 0;
        partyState.fromBattle = true;
      }
      if(B.sel===3) { // Run
        tryRun();
      }
    }
    if(ck('z')||ck('Z')) {} // Can't cancel main menu
  }

  // Move selection
  if(B.phase === 'fight') {
    let d = ckDir();
    let mc = B.playerPk.moves.length;
    if(d==='up'||d==='down') B.moveSel = (B.moveSel^2) % mc;
    if(d==='left'||d==='right') {
      let ns = B.moveSel^1;
      if(ns < mc) B.moveSel = ns;
    }

    if(ck('z')||ck('Z')) { B.phase='menu'; return; }

    if(ck('x')||ck('X')) {
      let move = B.playerPk.moves[B.moveSel];
      if(move && move.pp > 0) {
        executeTurn(move.name);
      }
    }
  }
}

function executeTurn(playerMove) {
  let B = battleState;
  let p = B.playerPk, e = B.enemy;
  let pMove = MOVES[playerMove];
  let eMoves = e.moves.filter(m => m.pp > 0);
  let eMoveName = eMoves.length > 0 ? eMoves[Math.floor(Math.random()*eMoves.length)].name : '몸통박치기';
  let eMove = MOVES[eMoveName];

  B.msg = [];
  B.msgIdx = 0; B.msgCharIdx = 0; B.msgTyping = true;

  // Determine order
  let pPri = pMove?.priority || 0;
  let ePri = eMove?.priority || 0;
  let playerFirst = pPri > ePri || (pPri === ePri && p.stats.spe >= e.stats.spe);

  let first = playerFirst ? {pk:p, move:playerMove, md:pMove, isPlayer:true} : {pk:e, move:eMoveName, md:eMove, isPlayer:false};
  let second = playerFirst ? {pk:e, move:eMoveName, md:eMove, isPlayer:false} : {pk:p, move:playerMove, md:pMove, isPlayer:true};

  // Reduce PP
  let pmIdx = p.moves.findIndex(m=>m.name===playerMove);
  if(pmIdx>=0) p.moves[pmIdx].pp--;
  let emIdx = e.moves.findIndex(m=>m.name===eMoveName);
  if(emIdx>=0) e.moves[emIdx].pp--;

  // Execute first attack
  executeMove(first, playerFirst?e:p, B);

  // Check if second attacker still alive
  let target2 = playerFirst ? p : e;
  let attacker2pk = second.pk;
  if(attacker2pk.curHP > 0 && target2.curHP > 0) {
    executeMove(second, target2, B);
  }

  // Check results
  if(e.curHP <= 0) {
    B.msg.push(t('bat.fainted', {name:getPkDisplayName(e)}));
    // EXP gain
    let expGain = Math.floor((e.stats.hp * POKEDEX[e.id].bexp) / 7);
    B.msg.push(t('bat.exp', {name:getPkDisplayName(p), exp:expGain}));
    p.exp += expGain;
    // Level up check
    while(p.exp >= p.expNext && p.level < 100) {
      p.level++;
      let d = POKEDEX[p.id];
      p.stats.hp = calcStat(d.bs.hp, p.level, p.iv.hp, true);
      p.stats.atk = calcStat(d.bs.atk, p.level, p.iv.atk);
      p.stats.def = calcStat(d.bs.def, p.level, p.iv.def);
      p.stats.spa = calcStat(d.bs.spa, p.level, p.iv.spa);
      p.stats.spd = calcStat(d.bs.spd, p.level, p.iv.spd);
      p.stats.spe = calcStat(d.bs.spe, p.level, p.iv.spe);
      let hpDiff = p.stats.hp - (p.curHP + (calcStat(d.bs.hp, p.level, p.iv.hp, true) - p.stats.hp));
      p.curHP = Math.min(p.stats.hp, p.curHP + Math.max(0, hpDiff));
      p.exp -= p.expNext;
      p.expNext = Math.pow(p.level+1,3) - Math.pow(p.level,3);
      B.msg.push(t('bat.levelup', {name:getPkDisplayName(p), lv:p.level}));
      // Learn new moves
      let newMoves = POKEDEX[p.id].moves.filter(m=>m.l===p.level);
      for(let nm of newMoves) {
        if(p.moves.length < 4) {
          p.moves.push({name:nm.m, pp:MOVES[nm.m]?.pp||10, maxPP:MOVES[nm.m]?.pp||10});
          B.msg.push((GS.lang==='ko'?getPkDisplayName(p)+'(은)는 '+moveName(nm.m)+'(을)를 배웠다!':getPkDisplayName(p)+' learned '+moveName(nm.m)+'!'));
        }
      }
    }
    B.phase = 'result';
  } else if(p.curHP <= 0) {
    B.msg.push(t('bat.fainted', {name:getPkDisplayName(p)}));
    B.phase = 'result';
  } else {
    B.phase = 'result';
  }
}

function executeMove(attacker, defender, B) {
  let name = getPkDisplayName(attacker.pk);
  let mname = moveName(attacker.move);
  B.msg.push(t('bat.used', {name:name, move:mname}));

  let md = attacker.md;
  if(!md) return;

  // Status moves
  if(md.cat === '변화') {
    // Simple stat messages
    return;
  }

  // Damage calc
  let lv = attacker.pk.level;
  let pow = md.pow;
  let atk = md.cat==='물리' ? attacker.pk.stats.atk : attacker.pk.stats.spa;
  let def = md.cat==='물리' ? defender.stats.def : defender.stats.spd;

  // Accuracy check
  if(Math.random()*100 > (md.acc||100)) {
    B.msg.push(GS.lang==='ko'?'빗나갔다!':'It missed!');
    return;
  }

  let base = Math.floor(((2*lv/5+2)*pow*atk/def)/50) + 2;

  // STAB
  let stab = 1;
  if(attacker.pk.types.includes(md.type)) stab = 1.5;

  // Type effectiveness
  let eff = getTypeEff(md.type, defender.types);

  // Critical
  let crit = 1;
  if(Math.random() < 0.0625) crit = 1.5;

  // Random
  let rand = 0.85 + Math.random()*0.15;

  let damage = Math.max(1, Math.floor(base * stab * eff * crit * rand));
  defender.curHP = Math.max(0, defender.curHP - damage);

  if(eff > 1) B.msg.push(t('bat.effective'));
  if(eff > 0 && eff < 1) B.msg.push(t('bat.noteffective'));
  if(eff === 0) B.msg.push(t('bat.noeffect', {name:getPkDisplayName(defender)}));
  if(crit > 1) B.msg.push(GS.lang==='ko'?'급소에 맞았다!':'A critical hit!');
}

function tryRun() {
  let B = battleState;
  B.runAttempts++;
  let pSpe = B.playerPk.stats.spe;
  let eSpe = B.enemy.stats.spe;
  let f = Math.floor((pSpe*128/Math.max(1,eSpe))+30*B.runAttempts) % 256;
  if(Math.random()*256 < f || B.type==='wild') {
    B.msg = [t('bat.ranaway')];
    B.phase = 'ranaway';
  } else {
    B.msg = [t('bat.cantrun')];
    B.phase = 'result';
  }
  B.msgIdx = 0; B.msgCharIdx = 0; B.msgTyping = true;
}

function tryUsePokeball() {
  let B = battleState;
  if(B.type !== 'wild') return;

  let ballItem = PD.bag.pokeballs.find(b => b.qty > 0);
  if(!ballItem) {
    B.msg = [GS.lang==='ko'?'포켓볼이 없다!':'No POKé BALLs!'];
    B.msgIdx=0; B.msgCharIdx=0; B.msgTyping=true;
    B.phase='result';
    return;
  }

  ballItem.qty--;
  let e = B.enemy;
  let maxHP = e.stats.hp;
  let curHP = e.curHP;
  let catchRate = POKEDEX[e.id]?.cr || 45;
  let ballBonus = ballItem.id==='greatball' ? 1.5 : 1;
  let statusBonus = e.status==='sleep'||e.status==='freeze' ? 2.5 : e.status ? 1.5 : 1;

  let a = Math.floor((3*maxHP - 2*curHP) * catchRate * ballBonus / (3*maxHP) * statusBonus);
  let b = Math.floor(65536 / Math.sqrt(Math.sqrt(255*3/Math.max(1,a))));

  let shakes = 0;
  for(let i=0;i<4;i++) {
    if(Math.random()*65536 < b) shakes++;
    else break;
  }

  let ballName = t('item.'+ballItem.id);
  B.msg = [t('bat.catch.throw', {name:ballName})];

  for(let i=0;i<Math.min(shakes,3);i++) B.msg.push('...');

  if(shakes >= 4) {
    B.msg.push(t('bat.catch.success', {name:getPkDisplayName(e)}));
    // Add to party or PC
    if(PD.party.length < 6) PD.party.push(e);
    else PD.pc.push(e);
    if(!PD.pokedex.caught.includes(e.id)) PD.pokedex.caught.push(e.id);
    B.phase = 'caught';
  } else {
    B.msg.push(t('bat.catch.fail'));
    // Enemy attacks
    let eMoves = e.moves.filter(m=>m.pp>0);
    if(eMoves.length > 0) {
      let eMoveName = eMoves[Math.floor(Math.random()*eMoves.length)].name;
      let eMove = MOVES[eMoveName];
      executeMove({pk:e, move:eMoveName, md:eMove, isPlayer:false}, B.playerPk, B);
    }
    B.phase = 'result';
  }
  B.msgIdx=0; B.msgCharIdx=0; B.msgTyping=true;
}

        let bounce = Math.sin(Date.now()/150)*1;

      }
      drawText(t(cmds[i]), cx, cy+10, GS.lang==='ko'?10:7, i===B.sel?C.text:C.textDis);
    }
  } else if(B.phase === 'fight') {
    // Move selection
    drawWin(0, H-52, W, 52);
    let moves = B.playerPk.moves;
    for(let i=0;i<moves.length;i++) {
      let mx = 12 + (i%2)*120;
      let my = H-44 + Math.floor(i/2)*22;
      let md = MOVES[moves[i].name];
      if(i===B.moveSel) {
        let bounce = Math.sin(Date.now()/150)*1;
        drawText('▶', mx-8+bounce, my+10, 8, C.pokered);
        // Type color indicator
        if(md) {
          ctx.fillStyle = TYPE_COLOR[md.type] || '#a8a878';
          ctx.fillRect(mx+80, my+2, 36, 12);
          drawText(GS.lang==='ko'?md.type:TYPE_EN[md.type], mx+82, my+11, 6, C.white, 'Press Start 2P');
        }
      }
      drawText(moveName(moves[i].name), mx, my+10, GS.lang==='ko'?10:7, i===B.moveSel?C.text:C.textDis);
      drawText(moves[i].pp+'/'+moves[i].maxPP, mx+65, my+10, 6, C.hint, 'Press Start 2P');
    }
  } else {
    // Message display
    ctx.fillStyle = '#282828';
    ctx.fillRect(0, H-52, W, 52);
    ctx.fillStyle = '#383838';
    ctx.fillRect(2, H-50, W-4, 48);
    if(B.msgIdx < B.msg.length) {
      let shown = B.msg[B.msgIdx].substring(0, Math.floor(B.msgCharIdx));
      drawText(shown, 10, H-28, GS.lang==='ko'?11:8, C.white);
      if(!B.msgTyping) {

        ctx.fillStyle = C.white;
        ctx.fillRect(W-16, H-12+bounce, 6, 6);
      }
    }
  }
}

  let d = ckDir();
  if(d==='up') menuState.sel = (menuState.sel+5)%6;
  if(d==='down') menuState.sel = (menuState.sel+1)%6;

  if(ck('z')||ck('Z')||ck('s')||ck('S')) { screen='field'; return; }

  if(ck('x')||ck('X')) {
    if(menuState.sel===0) { screen='party'; partyState.sel=0; partyState.fromBattle=false; }

}

  let d = ckDir();
  if(d==='up') partyState.sel = Math.max(0, partyState.sel-1);
  if(d==='down') partyState.sel = Math.min(PD.party.length-1, partyState.sel+1);

  if(ck('z')||ck('Z')) {
    screen = partyState.fromBattle ? 'battle' : 'menu';

  if(ck('x')||ck('X') && partyState.fromBattle) {

      battleState.msgIdx=0; battleState.msgCharIdx=0; battleState.msgTyping=true;
      battleState.phase = 'result';

  }
}

function saveGame() {
  let data = {
    player: { name:PD.name, gender:PD.gender, money:PD.money, badges:PD.badges, playTime:PD.playTime },
    party: PD.party, pc: PD.pc, bag: PD.bag,
    pokedex: PD.pokedex, flags: PD.flags,
    currentMap: fieldState.map,
    playerPos: { x:fieldState.px, y:fieldState.py, dir:fieldState.dir },
  };
  localStorage.setItem('pkt_save', JSON.stringify(data));
}

function loadGame() {
  try {
    let data = JSON.parse(localStorage.getItem('pkt_save'));
    if(!data) return false;
    PD.name = data.player.name;
    PD.gender = data.player.gender;
    PD.money = data.player.money;
    PD.badges = data.player.badges || [];
    PD.playTime = data.player.playTime || 0;
    PD.party = data.party || [];
    PD.pc = data.pc || [];
    PD.bag = data.bag || { items:[], pokeballs:[], keyItems:[], tms:[] };
    PD.pokedex = data.pokedex || { seen:[], caught:[] };
    PD.flags = data.flags || {};
    fieldState.map = data.currentMap;
    fieldState.px = data.playerPos.x;
    fieldState.py = data.playerPos.y;
    fieldState.dir = data.playerPos.dir;
    return true;
  } catch(e) { return false; }
}

// ========== GAME LOOP ==========
let lastTime = 0;
let accumulator = 0;
const TICK = 1000/60;

function gameLoop(time) {
  requestAnimationFrame(gameLoop);
  ctx.imageSmoothingEnabled = false;

  let dt = time - lastTime;
  lastTime = time;
  accumulator += dt * GS.speed;

  while(accumulator >= TICK) {
    accumulator -= TICK;
    update();
  }

  render();
}

function update() {
  updateFade();
  if(fade.active) return;

  switch(screen) {
    case 'title': updateTitle(); break;
    case 'options': updateOptions(); break;
    case 'prologue': updatePrologue(); break;
    case 'field': updateField(); break;
    case 'battle': updateBattle(); break;
    case 'menu': updateMenu(); break;
    case 'dialog': updateDialog(); break;
    case 'starter': updateStarter(); break;
    case 'party': updateParty(); break;
    case 'bag_menu': updateBag(); break;
  }
}

function render() {
  ctx.clearRect(0,0,W,H);

  switch(screen) {
    case 'title': renderTitle(); break;
    case 'options': renderOptions(); break;
    case 'prologue': renderPrologue(); break;
    case 'field': renderField(); break;
    case 'battle': renderBattle(); break;
    case 'menu': renderMenu(); break;
    case 'dialog':
      renderField();
      renderDialog();
      break;
    case 'starter': renderStarter(); break;
    case 'party': renderParty(); break;
    case 'bag_menu': renderBag(); break;
  }

  drawFade();
}

// ========== START ==========
requestAnimationFrame(gameLoop);
</script>
